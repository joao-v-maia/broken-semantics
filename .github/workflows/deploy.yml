name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        run: |
          HUGO_VERSION=0.145.0
          wget -q https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_withdeploy_${HUGO_VERSION}_linux-amd64.tar.gz
          tar -xzf hugo_extended_withdeploy_${HUGO_VERSION}_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: sa-east-1

      - name: Build and deploy
        env:
          HUGO_SERVICES_GOOGLEANALYTICS_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          DEPLOY_S3_URL: ${{ vars.DEPLOY_S3_URL }}
          DEPLOY_CF_DISTRIBUTION_ID: ${{ vars.DEPLOY_CF_DISTRIBUTION_ID }}
        run: |
          sed -i "s|DEPLOY_S3_URL|${DEPLOY_S3_URL}|g" hugo.toml
          sed -i "s|DEPLOY_CF_DISTRIBUTION_ID|${DEPLOY_CF_DISTRIBUTION_ID}|g" hugo.toml
          hugo --minify
          hugo deploy --target production
